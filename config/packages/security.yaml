security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_home

    role_hierarchy:
        ROLE_EMPLOYE: ROLE_USER
        ROLE_ADMIN: [ROLE_EMPLOYE, ROLE_USER]

    access_control:
        - { path: ^/mon-profil, roles: ROLE_USER }
        - { path: ^/mes-commandes, roles: ROLE_USER }
        - { path: ^/commander, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_EMPLOYE }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
