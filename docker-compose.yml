version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - mariadb
      - mongodb
    environment:
      DATABASE_URL: 'mysql://root:root@mariadb:3306/vite_gourmand'
      MONGODB_URL: 'mongodb://mongodb:27017'
      APP_ENV: dev
      APP_SECRET: 'changeme32characterssecretkey!!'

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: vite_gourmand
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/01_database.sql
      - ./database/jeudedonnees.sql:/docker-entrypoint-initdb.d/02_jeudedonnees.sql

  mongodb:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  phpmyadmin:
    image: phpmyadmin
    ports:
      - '8081:80'
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb

volumes:
  mariadb_data:
  mongo_data:
